# ============================================================
# CashCue VirtualHost & Security Configuration
# Compatible Docker and VM
# ============================================================

<VirtualHost *:80>

    # --------------------------------------------------------
    # Server identity
    # --------------------------------------------------------
    ServerAdmin webmaster@localhost
    ServerName localhost

    # --------------------------------------------------------
    # Document root (DO NOT change)
    # Application lives under /cashcue
    # --------------------------------------------------------
    DocumentRoot /var/www/html

    # --------------------------------------------------------
    # Main directory configuration
    # --------------------------------------------------------
    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # --------------------------------------------------------
    # CashCue application directory
    # --------------------------------------------------------
    <Directory /var/www/html/cashcue>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Restrict HTTP methods to only what the app uses
        <LimitExcept GET POST HEAD>
            Require all denied
        </LimitExcept>
    </Directory>

    # --------------------------------------------------------
    # Prevent access to hidden files (.git, .env, etc.)
    # --------------------------------------------------------
    <FilesMatch "^\.|(\.env|\.ini|\.log|\.conf|\.sh|\.sql)$">
        Require all denied
    </FilesMatch>

    # --------------------------------------------------------
    # Logging
    # Docker: logs go to stdout/stderr
    # VM: standard Apache log paths
    # --------------------------------------------------------
    ErrorLog ${APACHE_LOG_DIR}/cashcue_error.log
    CustomLog ${APACHE_LOG_DIR}/cashcue_access.log combined

</VirtualHost>

# ============================================================
# Global Security Hardening
# ============================================================

# Hide Apache version and OS
ServerSignature Off
ServerTokens Prod

# Disable directory listing globally
<Directory /var/www/html>
    Options -Indexes
</Directory>

# Security Headers
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set X-Permitted-Cross-Domain-Policies "none"
</IfModule>

# Performance / DOS protection
Timeout 60
KeepAlive On
MaxKeepAliveRequests 100
KeepAliveTimeout 5